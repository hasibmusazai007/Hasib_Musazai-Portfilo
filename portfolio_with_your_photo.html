<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
body{margin:0;font-family:Arial,sans-serif;background:#081226;color:white}
nav{position:fixed;top:0;width:100%;padding:15px 8%;background:#0b1220;display:flex;justify-content:space-between}
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;gap:50px;padding:100px 8%}
.hero img{width:320px;height:320px;object-fit:cover;border-radius:50%;border:4px solid #33b5ff;box-shadow:0 0 30px #33b5ff}
.btn{background:#33b5ff;color:black;padding:12px 20px;text-decoration:none;border-radius:8px}
</style>
</head>
<body>
<nav>
<h2>My Portfolio</h2>
</nav>

<section class="hero">
<div>
<h1>Your Name</h1>
<h3 id="typing"></h3>
<p>Edit the text in this file with your real details.</p>
<a href="#" class="btn">Download CV</a>
</div>
<img src="https://raw.githubusercontent.com/hasibmusazai007/Hasib_Musazai-Portfilo/e39688e71a2deaecd33f2da469fe47b02b682042/Image.jpeg" alt="Profile">
</section>

<script>
const roles=["Full Stack Developer","Frontend Developer","Web Designer"];
let i=0;
setInterval(()=>{
document.getElementById("typing").innerText=roles[i];
i=(i+1)%roles.length;
},1500);
</script>
</body>
</html>
